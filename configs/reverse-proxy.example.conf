# Ví dụ nginx: HTTPS công khai → HTTP backend Next (localhost:3040)
# Giữ nguyên host + báo HTTPS cho app (bắt buộc để cookie Secure / redirect đúng).

server {
    listen 443 ssl;
    server_name chamcong.chinhct.com;

    # ssl_certificate ...;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        # Host nội bộ có thể là localhost — quan trọng là Forwarded-Host + Proto cho Next (cookie Secure + Server Action CSRF).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Forwarded "proto=$scheme;host=$host";
    }
}
